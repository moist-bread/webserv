<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/index.css" type="text/css">
	<title>Banana</title>
</head>
<body>
	<div class="note-markers">
		<a class="page-paper blue-strip shadow" href='/home'>
			<p>back home...</p>
		</a>
		<a class="page-paper yellow-strip shadow" href='/write'>
			<p>leave a note !</p>
		</a>
	</div>

	<div class="text green-mark">Common Gateway Interface Examples</div>

	<div class="paper stack">
		<form id="file_upload" action="/example_cgi.py" method="GET">
			<h4 style="margin-top: 0px;">Sending a GET request with a Query in the request URI to the CGI</h4>
			<div class="form-group">
				<label for="title" style="padding-right: 15px">Query:</label>
				<input type="text" id="query" name="query" required>
			</div>
			<div class="page-paper green-strip shadow" >
				<button type="submit">Submit</button>
			</div>
		</form>
	</div>


	<div class="paper stack">
		<form action="/example_cgi.py" method="POST">
			<h4 style="margin-top: 0px;">Sending a POST request with the content in the request Body to the CGI</h4>
			<div class="form-group">
				<label for="title" style="padding-right: 15px">Body:</label>
				<input type="text" id="body" name="body" required>
			</div>
			<div class="page-paper green-strip shadow" >
				<button type="submit">Submit</button>
			</div>
		</form>
	</div>


	<div class="paper stack">
		<form id="file_upload" action="/" method="POST" enctype="multipart/form-data">
			<h3>coisa</h3>
			<div class="form-group">
				<label for="title" style="padding-right: 15px">TITLE:</label>
				<input type="text" id="media_title" name="title" required>
			</div>
			<div class="form-group">
				<label for="title" style="padding-right: 15px">TITLE:</label>
				<input type="text" id="media_title" name="title" required>
			</div>
			<div class="page-paper pink-strip shadow" >
				<button type="submit">Submit</button>
			</div>
		</form>
	</div>

</body>
</html>
