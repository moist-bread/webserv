<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/index.css" type="text/css">
	<title>Banana</title>
</head>
<body>
	<div class="text yellow-mark">this is important</div>
	<div class="text green-mark">wait, this is also important</div>
	<div class="text red-mark">wow, almost forgot this</div>
	<br>
	<br>
	<form action="/main.py" method="GET">
		<label for="fname">Query GET request:</label>
		<input type="text" id="query" name="query"><br><br>
		<input type="submit" value="Submit">
	</form>
	<br><br><br>
	<form action="/main.py" method="POST">
		<label for="fname">Script w/ Body POST request:</label>
		<input type="text" id="body" name="body"><br><br>
		<input type="submit" value="Submit">
	</form>
	<br><br><br>
	<form action="/" method="POST">
		<p>Store Body in location POST request:</p>
		<label for="username">username:</label>
		<input type="text" id="username" name="username"><br><br>
		<label for="title">post title:</label>
		<input type="text" id="title" name="title"><br><br>
		<label for="notes">notes:</label>
		<input type="text" id="notes" name="notes"><br><br>
		<input type="submit" value="Submit">
	</form>
	<form id="basic_file_upload" action="/" method="POST" enctype="multipart/form-data">
		<p>Basic file upload:</p>
		<label for="file">file:</label>
		<input type="file" id="file" name="media" required>
		<input type="submit" value="Submit">
	</form>
	<form id="file_upload" action="/" method="POST" enctype="multipart/form-data">
		<p>Send us a File:</p>
		<label for="file">file:</label>
		<input type="file" id="file_input" name="media" required>
		<input type="text" id="title" name="title"><br><br>
		<button type="submit">📤 Upload</button>
		<progress id="progressBar" value="0" max="100" hidden></progress>
	</form>
	<p id="result"></p>
	<div class="text yellow-mark">uploads</div>
	<div id="file-list">Loading files...</div>
	
	<script>

		const file_upload = document.getElementById("file_upload");
		
		file_upload.addEventListener("submit", function(e)
		{
			// this makes it so that the client doesnt lose connection whilst doing an upload that is "too large"
			e.preventDefault();
			progressBar.value = 0;

			const file_input = document.getElementById("file_input");
			const text_input = document.getElementById("title");
			const result = document.getElementById("result");
			const progressBar = document.getElementById("progressBar");

			if (!file_input.files.length) {
				result.innerText = "Please select a file...";
				return;
			}

			const formData = new FormData();
			formData.append("media", file_input.files[0]);
			formData.append("title", text_input.value);

			const xhr = new XMLHttpRequest();
			xhr.open("POST", "/");

			progressBar.hidden = false;

			xhr.upload.addEventListener("progress", (e) => {
				if (e.lengthComputable)
				{
					const percent = (e.loaded / e.total) * 100;
					progressBar.value = percent;
				}
			});

			xhr.onload = () => {

				if (xhr.status === 200 || xhr.status === 302)
				{
					result.innerText = "Upload successful!!";
					load_files();
					progressBar.value = 100;
				}
				else
					result.innerText = "❌ Server error: " + xhr.status;
			};

			xhr.onerror = () => { result.innerText = "❌ Upload stopped with error: " + xhr.status; };
			xhr.send(formData);

		});


		async function load_files()
		{
			try
			{
				const response = await fetch("/uploads");
				const text = await response.text();
				if (!response.ok)
					throw "Couldn't load the files...";

				const parser = new DOMParser();
				const doc = parser.parseFromString(text, "text/html");
				const links = Array.from(doc.querySelectorAll("li > a"));
				if (links.length === 0)
					throw "No files to load...";

				const listContainer = document.getElementById("file-list");
				listContainer.innerHTML = "";
				links.forEach((link) => {
					const href = link.getAttribute("href");
					const name = link.textContent;
					
					if (href !== ".." && name !== "..") {
						const card = document.createElement("div");
						console.log(href);
						card.className = "file-card";
						card.innerHTML = `
						<span>${name}</span>
						<div class="actions">
							<a href="${href}" target="_blank">Preview</a>
							<button onclick="delete_file('${href}')" 
							style="color: red; cursor: pointer; border: 1px solid red; background: none; border-radius: 4px; padding: 2px 8px; margin-left: 10px;">
								Delete
							</button>
						</div>`;
						listContainer.appendChild(card);
					}
				});
			}
			catch (error)
			{
				console.error("Error loading files:", error);
				document.getElementById("file-list").innerHTML = error;
			}
		}

		async function delete_file(file_name)
		{
			if (!confirm(`do you want to delete the following file? \"${file_name}\"`))
				return;

			try
			{
				const response = await fetch(`${file_name}`, {method: "DELETE"});
				if (response.ok)
				{
					alert("File deleted successfully");
					load_files();
				}
				else
					throw response.status;
			}
			catch (error)
			{
				console.error("Error when trying to delete: ", error);
				alert("Failed to delete file");
			}
		}

		load_files();
	</script>
</body>
</html>
